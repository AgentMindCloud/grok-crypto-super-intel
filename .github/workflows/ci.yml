# .github/workflows/ci.yml - CI for Grok Crypto Super Intel (v3 packaging)
# Runs on push/PR: pytest + lint (ruff + black check)

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff black pytest

    - name: Lint with ruff
      run: |
        ruff check .

    - name: Format check with black
      run: |
        black --check .

    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short

    - name: Verify Streamlit app imports
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        # Basic import check for main modules (pandas etc. from reqs)
        from app import *  # or specific
        print('App imports OK')
        from data import get_global_data
        print('Data layer OK')
        print('CI basic verification passed.')
        "
