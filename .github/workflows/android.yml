name: Android — Build Sentinel APK

# Builds the signed Sentinel APK entirely in the cloud and publishes it to a GitHub Release,
# so the phone only ever downloads + installs (no PC, no local toolchain). Signing is driven by
# repo Secrets (KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD); if those are
# absent the build still succeeds with a debug-signed APK.

on:
  push:
    branches:
      - "claude/**"
      - main
    paths:
      - "android-sentinel/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-sentinel
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testReleaseUnitTest --no-daemon

      - name: Locate APK
        id: apk
        run: echo "path=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-release-apk
          path: android-sentinel/${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish to GitHub Release
        if: github.ref == 'refs/heads/claude/security-app-design-hn8lm3' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sentinel-build-${{ github.run_number }}
          name: Sentinel build ${{ github.run_number }}
          body: |
            Automated Sentinel APK build.
            Download the APK below on your phone, enable "install unknown apps", and tap to install.
            (Debug-signed unless signing secrets are configured — see setup-signing workflow.)
          prerelease: true
          files: android-sentinel/${{ steps.apk.outputs.path }}
